# Prometheus configuration file
# This tells Prometheus where to scrape metrics from

global:
  scrape_interval: 15s  # How often to collect metrics
  evaluation_interval: 15s  # How often to evaluate rules

# What services to monitor
scrape_configs:
  # Monitor Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Monitor our API instances
  - job_name: 'slashly-api'
    # Docker DNS will resolve 'api' to all replicas in docker-compose
    # and 'tasks.api' in Docker Swarm
    dns_sd_configs:
      - names:
          - 'api'
          - 'tasks.api'
        type: 'A'
        port: 8080
    metrics_path: '/metrics'  # Where our API exposes metrics
    scrape_interval: 10s

  # Monitor our Worker instances
  - job_name: 'slashly-worker'
    static_configs:
      - targets: ['analytics-worker:8081']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Monitor RabbitMQ
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: '/metrics/detailed'
    params:
      family: ['queue_coarse_metrics']
    scrape_interval: 10s

  # Monitor Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  # Monitor PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
