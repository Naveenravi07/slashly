events {
    worker_connections 1024;
}

http {
    # This upstream block defines the backend servers
    # 'api_backend' is just a name we choose for this group of servers
    upstream api_backend {
        least_conn;  # Load balancing algorithm: send to server with least connections
        
        # 'api' is the service name from docker-compose.yml
        # Docker Compose automatically load balances across all replicas of the 'api' service
        # So this single line actually points to all 3 replicas!
        server api:8080 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        
        location / {
            # Here we reference the upstream block we defined above
            # proxy_pass sends traffic to 'api_backend' which points to 'api:8080'
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
